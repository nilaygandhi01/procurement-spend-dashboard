# Docker image build & publish for the procurement-spend-dashboard
# static-site nginx container.
#
# Why this file exists in its current shape
# -----------------------------------------
# The Deployer K8s PaaS control plane originally scaffolded this
# workflow file with the entire body commented out (every line started
# with `#`). That scaffold was tailored for a Node.js starter-app under
# `deployer-apps/cumminsidp/src/` — running npm/yarn, parsing
# package.json for versioning, etc. — which does not match THIS repo.
# This repo ships a static-site nginx container built from the root
# Dockerfile that serves `src/dashboard/`, so the workflow below is
# tailored accordingly:
#
#   * No Node.js / npm / yarn / package.json steps (we have none).
#   * No JFrog Xray SCA scan (no language-level dependency manifests
#     to audit).
#   * No Wiz container scan (intentionally dropped for first-green
#     rollout per maintainer decision; reintroduce as a blocking step
#     once WIZCLI_* secrets are confirmed available and signed off).
#   * Builds from `./Dockerfile` (repo root), targets the JFrog repo
#     the Helm chart is already pointing at.
#
# The original commented-out template is preserved in git history at
# commits prior to the one that introduced this file body.

name: cumminsidp-Build and Publish

run-name: "🐳 Build & Publish — ${{ github.ref_name }} (${{ github.sha }})"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'deploy/nginx/**'
      - 'deploy/tailwind/**'
      - 'src/**'
      - 'deploy/helm/**'

permissions:
  id-token: write     # required by jfrog/setup-jfrog-cli OIDC
  contents: read
  actions: write

env:
  JF_REPO: mckinsey-cummins-idp-dashboard-docker-local.jfrog.io
  IMAGE_NAME: procurement-spend-dashboard

jobs:
  docker-build-and-publish:
    name: Build and Publish Docker Image
    runs-on: [gh-larger-linux-mini]
    outputs:
      image_tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity-check Dockerfile exists
        run: |
          set -eu
          test -f Dockerfile || { echo "::error::Dockerfile not found at repo root"; exit 1; }
          test -f deploy/nginx/default.conf || { echo "::error::deploy/nginx/default.conf not found"; exit 1; }
          echo "Dockerfile + nginx config present."

      - name: Compute image tag
        id: version
        run: |
          set -eu
          # Base version comes from the Helm chart so the chart & image
          # versions stay in lockstep without a second source of truth.
          BASE_VERSION=$(grep -m1 '^version:' deploy/helm/procurement-spend-dashboard/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [ -z "$BASE_VERSION" ]; then
            BASE_VERSION="0.1.0"
          fi
          COMMIT_SHA8="${GITHUB_SHA:0:8}"
          IMMUTABLE_TAG="${BASE_VERSION}-${COMMIT_SHA8}"
          echo "tag=$IMMUTABLE_TAG"           >> "$GITHUB_OUTPUT"
          echo "commit_sha8=$COMMIT_SHA8"     >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION"   >> "$GITHUB_OUTPUT"
          echo "Base version : $BASE_VERSION"
          echo "Commit SHA8  : $COMMIT_SHA8"
          echo "Immutable tag: $IMMUTABLE_TAG"

      - name: Set up JFrog CLI (rw scope, OIDC)
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://mckinsey.jfrog.io
        with:
          oidc-provider-name: svc-24468-rw
          oidc-audience: rw

      - name: Build Docker image (tagged with immutable + latest)
        run: |
          set -eu
          docker build \
            --file Dockerfile \
            --tag "${JF_REPO}/${IMAGE_NAME}:${{ steps.version.outputs.tag }}" \
            --tag "${JF_REPO}/${IMAGE_NAME}:latest" \
            .
          echo "Built image with tags:"
          echo "  ${JF_REPO}/${IMAGE_NAME}:${{ steps.version.outputs.tag }}"
          echo "  ${JF_REPO}/${IMAGE_NAME}:latest"

      - name: Push image to JFrog
        run: |
          set -eu
          jf docker push "${JF_REPO}/${IMAGE_NAME}:${{ steps.version.outputs.tag }}"
          jf docker push "${JF_REPO}/${IMAGE_NAME}:latest"

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Build & Publish — $([ ${{ job.status }} = success ] && echo ':white_check_mark:' || echo ':x:')"
            echo ""
            echo "**Repo:** \`${JF_REPO}/${IMAGE_NAME}\`"
            echo ""
            echo "**Tags pushed:**"
            echo "- \`${{ steps.version.outputs.tag }}\` (immutable, points at \`${{ github.sha }}\`)"
            echo "- \`latest\` (moving)"
            echo ""
            echo "### Next step — roll the pod"
            echo ""
            echo "The Helm chart's \`image.tag\` is still pinned to the chart's"
            echo "base version (\`${{ steps.version.outputs.base_version }}\`) and"
            echo "\`imagePullPolicy: IfNotPresent\`, so a fresh push alone will not"
            echo "reach the pod. Pick ONE:"
            echo ""
            echo "1. **Recommended — bump the chart values.** Update"
            echo "   \`deploy/helm/procurement-spend-dashboard/values-prod-us-east-1.yaml\`"
            echo "   and"
            echo "   \`deployer-apps/cumminsidp/prod-us-east-1/manifests/values.yaml\`"
            echo "   so \`image.tag\` is \`${{ steps.version.outputs.tag }}\`, then commit."
            echo "   ArgoCD will detect the manifest change and roll the deployment."
            echo ""
            echo "2. **Quick — restart the deployment to re-pull \`latest\`.** Requires"
            echo "   \`image.tag: latest\` AND \`image.pullPolicy: Always\` in values."
            echo "   Then \`kubectl rollout restart deployment/procurement-spend-dashboard -n cumminsidp-a8dd5\`."
          } >> "$GITHUB_STEP_SUMMARY"
