name: cumminsidp-prod-us-Upload to S3

on:
  workflow_dispatch:
    inputs:
      bucket:
        description: "Short bucket name (lowercase alphanumeric + hyphens) matching a key in the RP's `s3_buckets` Terraform input that opted into the `S3Uploader` role. NOT the full AWS bucket name."
        required: true
        type: string
      protocol_version:
        description: "STS payload protocol version (forward-compat contract between workflow and skill)"
        required: false
        type: string
        default: "1"

permissions:
  id-token: write
  contents: read

jobs:
  upload-to-s3:
    name: Upload to S3
    runs-on: gh-larger-linux-arm64-mini
    # Bind to the per-instance-env-region GitHub Environment so that
    # `vars.AWS_WORKLOAD_ACCOUNT_ID`, `vars.USER_ENVIRONMENT_ID`, and the
    # per-RP `vars.VAULT_*` resolve automatically. The OIDC sub claim becomes
    # `repo:<org>/<repo>:environment:<env>`, which matches:
    #   1. The per-bucket S3Uploader role's trust policy (configured with
    #      `ref = "*"` in the firm `github-oidc-role` module → StringLike
    #      against `repo:<subject>:*`, accepting both ref-form and env-form
    #      sub claims)
    #   2. The Vault JWT role `mck-internal-<rp_id>-rw` (env-form only)
    # See DEPL-644 design notes for the full rationale.
    environment: cumminsidp-prod-us-east-1
    outputs:
      vault_path: ${{ steps.upload.outputs.vault_path }}
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Validate dispatch inputs
        env:
          BUCKET: ${{ inputs.bucket }}
        run: |
          if ! printf '%s' "$BUCKET" | grep -Eq '^[a-z0-9]+(-[a-z0-9]+)*$'; then
            echo "::error::bucket must match ^[a-z0-9]+(-[a-z0-9]+)*$ (lowercase alphanumeric + hyphens, no leading/trailing dash)"
            exit 1
          fi

      - name: Compose role ARN and bucket full name
        id: compose
        env:
          AWS_WORKLOAD_ACCOUNT_ID: ${{ vars.AWS_WORKLOAD_ACCOUNT_ID }}
          USER_ENVIRONMENT_ID: ${{ vars.USER_ENVIRONMENT_ID }}
          BUCKET: ${{ inputs.bucket }}
        run: |
          role_arn="arn:aws:iam::${AWS_WORKLOAD_ACCOUNT_ID}:role/S3-${AWS_WORKLOAD_ACCOUNT_ID}-${USER_ENVIRONMENT_ID}-${BUCKET}-S3Uploader"
          bucket_full_name="${AWS_WORKLOAD_ACCOUNT_ID}-${USER_ENVIRONMENT_ID}-${BUCKET}"
          echo "role_arn=${role_arn}" >> "$GITHUB_OUTPUT"
          echo "bucket_full_name=${bucket_full_name}" >> "$GITHUB_OUTPUT"

      - name: Assume role and write STS to Vault
        id: upload
        uses: McK-Internal/lrah-control-plane/.github/actions/aws/lrah-upload-s3-creds@v1.44.0
        with:
          role_arn: ${{ steps.compose.outputs.role_arn }}
          bucket_full_name: ${{ steps.compose.outputs.bucket_full_name }}
          protocol_version: ${{ inputs.protocol_version }}
          vault_addr: ${{ vars.VAULT_ADDR }}
          vault_mount_path: ${{ vars.VAULT_MOUNT_PATH }}
          vault_gha_auth_role: ${{ vars.VAULT_GHA_AUTH_ROLE }}
          gh_org_name: ${{ vars.GH_ORG_NAME }}
          cf_access_client_id: ${{ secrets.GHA_U2A_CF_ACCESS_CLIENT_ID }}
          cf_access_client_secret: ${{ secrets.GHA_U2A_CF_ACCESS_CLIENT_SECRET }}

      - name: Surface Vault path
        env:
          VAULT_PATH: ${{ steps.upload.outputs.vault_path }}
        run: |
          echo "STS written to Vault at: ${VAULT_PATH}"
          echo "Skill consumes via: vault kv get -format=json ${VAULT_PATH}"
          echo "Auto-expires after 12h (delete_version_after metadata)"
