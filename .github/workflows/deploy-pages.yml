# DISABLED for auto-trigger on 2026-05-17 — Cummins client procurement data
# must NOT be deployed to GitHub Pages. The McKinsey-internal Deployer K8s
# PaaS path (see docs/DEPLOYMENT.md → "Deployer K8s PaaS") is the only
# approved deployment target for this dashboard.
#
# The workflow is preserved (workflow_dispatch only) so it can be diffed
# or referenced, but it will NOT run on push. To fully remove auto-deploy,
# also disable GitHub Pages in the repo Settings → Pages.
name: Deploy GitHub Pages (DISABLED — do not enable for client data)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build data and stage dashboard
        run: |
          python src/scripts/refresh_data.py
          cp data/outputs/data.json src/dashboard/
          find data/inputs/indexes -maxdepth 1 -name '*.xlsx' -exec cp {} src/dashboard/ \;

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "src/dashboard"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
