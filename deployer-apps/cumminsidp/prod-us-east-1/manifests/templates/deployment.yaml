{{- if .Values.image }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "app.labels" . | nindent 4 }}
  {{- range $key, $val := .Values.labels }}
  {{- $key | nindent 4 }}: {{ $val | quote }}
  {{- end}}
  {{- if .Values.annotations }}
  annotations:
  {{- range $key, $val := .Values.annotations }}
  {{- $key | nindent 4 }}: {{ $val | quote }}
  {{- end}}
  {{- end}}
spec:
  selector:
    matchLabels:
    {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
      {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.s3 }}
      initContainers:
      - name: fetch-data
        image: {{ .Values.initImage | default "amazon/aws-cli:2.17.46" }}
        imagePullPolicy: IfNotPresent
        env:
        - name: AWS_REGION
          value: {{ .Values.s3.region | default "us-east-1" | quote }}
        - name: AWS_DEFAULT_REGION
          value: {{ .Values.s3.region | default "us-east-1" | quote }}
        - name: BUCKET
          value: {{ .Values.s3.bucket | quote }}
        - name: OBJECT_KEY
          value: {{ .Values.s3.objectKey | default "data.json" | quote }}
        command: ["/bin/sh","-c"]
        args:
        - |
          set -eu
          aws s3 cp "s3://${BUCKET}/${OBJECT_KEY}" /work/data.json
          echo "fetched $(wc -c < /work/data.json) bytes"
        resources:
          # Namespace LimitRange caps cpu limit:request ratio at 8:1.
          # Request was 100m vs limit 1 → 10:1, blocked by admission
          # ("cpu max limit to request ratio per Container is 8, but
          # provided ratio is 10.000000"). Bumped request to 150m → 6.67:1.
          # Limit kept at 1 CPU because this initContainer downloads
          # ~255 MB from S3 and benefits from full CPU during the
          # brief transfer.
          requests:
            cpu: 150m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: app-data
          mountPath: /work
      {{- end }}
      containers:
      - image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        name: {{ .Chart.Name }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        securityContext: {}
        resources:
          limits:
            cpu: 800m
            memory: 256Mi
          requests:
            cpu: 400m
            memory: 128Mi
        env:
        # Uncomment the following lines to enable McK ID configuration
        # See Deployer documentation on how to configure secrets
        # - name: MID_CLIENT_ID
        #   valueFrom:
        #     secretKeyRef:
        #       name: lrah-secret-generic
        #       key: MID_CLIENT_ID
        # - name: MID_CLIENT_SECRET
        #   valueFrom:
        #     secretKeyRef:
        #       name: lrah-secret-generic
        #       key: MID_CLIENT_SECRET
        - name: NODE_ENV
          value: {{ .Values.env.NODE_ENV }}
        - name: APP_VERSION
          value: {{ .Values.image.tag }}
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /run
        {{- if .Values.s3 }}
        - name: app-data
          mountPath: /usr/share/nginx/html/data.json
          subPath: data.json
          readOnly: true
        {{- end }}
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      {{- if .Values.s3 }}
      - name: app-data
        emptyDir:
          sizeLimit: 1Gi
      {{- end }}
      {{- if and .Values.deployer .Values.deployer.saReadWriteRoleARN }}
      serviceAccountName: {{ include "app.fullname" . }}-sa
      automountServiceAccountToken: false
      {{- end }}
{{- end }}
