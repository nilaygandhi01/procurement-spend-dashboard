      app.kubernetes.io/instance: procurement-spend-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: procurement-spend-dashboard
        app.kubernetes.io/instance: procurement-spend-dashboard
    spec:
      imagePullSecrets:
        - name: jfrog-cumminsidp-a8dd5-secret
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: procurement-spend-dashboard-sa
      automountServiceAccountToken: false
      initContainers:
        - name: fetch-data
          image: "amazon/aws-cli:2.17.46"
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: BUCKET
              value: "649941507750-cumminsidp-a8dd5-spend-data"
            - name: OBJECT_KEY
              value: "data.json"
            # Pin HOME + AWS config paths to /tmp so the AWS CLI (running
            # as a non-root user) doesn't try to write to /root/.aws and
            # crash with `[Errno 13] Permission denied: '/root/.aws'`.
            - name: HOME
              value: "/tmp"
            - name: AWS_CONFIG_FILE
              value: "/tmp/.aws/config"
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: "/tmp/.aws/credentials"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              aws s3 cp "s3://${BUCKET}/${OBJECT_KEY}" /work/data.json
              echo "fetched $(wc -c < /work/data.json) bytes"
          resources:
            # cpu request bumped 100m → 150m to satisfy the namespace
            # LimitRange's 8:1 max cpu limit:request ratio (was 10:1).
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app-data
              mountPath: /work
      containers:
        - name: dashboard
          # Pinned to the immutable commit-specific tag emitted by build
          # #24 (commit 36f657e — first green build to ship the Tailwind
          # precompile, nginx real-404 rule, and harmonization-client.js
          # sanity check). Was `:0.1.0` (mutable floating tag). The float
          # produced this incident: ArgoCD's pod-replacement event was
          # the same image:tag string the node had cached locally, so
          # K8s' default `IfNotPresent` policy skipped pulling the
          # freshly-built layers from JFrog and the pod came up on stale
          # bits (view-source on the deployed page still showed the
          # cdn.tailwindcss.com <script> tag removed at b28f3fb).
          # Pinning to the SHA-suffixed tag forces a digest-different
          # image reference, which together with `imagePullPolicy: Always`
          # below guarantees the kubelet does a fresh registry pull on
          # the next rollout.
          image: "mckinsey-cummins-idp-dashboard-docker-local.jfrog.io/procurement-spend-dashboard:0.1.0-bc801950"
          # Bumped from IfNotPresent → Always so future `:0.1.0` floats
          # (and any other tag reuse) can't silently degrade to a cached
          # node image. The pull cost on this image is negligible (~50 MB)
          # and the workload is single-replica, so the latency on rollout
          # is dwarfed by the JFrog network round-trip the imagePullSecret
          # auth already requires.
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            # cpu request bumped 50m → 75m to satisfy the namespace
            # LimitRange's 8:1 max cpu limit:request ratio (was 10:1).
            requests:
              cpu: 75m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: app-data
              mountPath: /usr/share/nginx/html/data.json
              subPath: data.json
              readOnly: true
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: app-data
          emptyDir:
            sizeLimit: 1Gi
