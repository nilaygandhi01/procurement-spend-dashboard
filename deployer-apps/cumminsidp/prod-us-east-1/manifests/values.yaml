# EDIT THIS FILE TO CUSTOMIZE YOUR APPLICATION DEPLOYMENT

# Configuration for your workload instance on the deployer PaaS:
# - EnvironmentID: cumminsidp-a8dd5
# - ProductID: 24468
# - AWSWorkloadAccountID: 649941507750
# - AWSWorkloadRegion: us-east-1
# - CloudflareZone: apps.mckinsey.com
#
#
# Example Helm values configuration:
#
# image:
#   repository: <your-jfrog-repo>/cumminsidp-app
#   tag: SET_BY_CI_PIPELINE  # replaced by CI with semver+commit-hash (e.g., 0.1.0-fee4554a)
#   pullPolicy: IfNotPresent
#
image:
  repository: mckinsey-cummins-idp-dashboard-docker-local.jfrog.io/procurement-spend-dashboard
  # Pinned to the SHA-suffixed tag emitted by the docker build that ran
  # for commit 00b5c5f (fix(harmonization): repair invalid dynamic-string
  # object keys in IO Excel export and stop caching index.html).
  # Pinning to a SHA-suffixed tag
  # forces a digest-different image reference, which together with
  # `pullPolicy: Always` below guarantees a fresh registry pull on the
  # next rollout (history of why: pre-build-#24 used the mutable
  # floating "0.1.0" tag and ArgoCD's pod-replacement event reused a
  # node-cached layer due to IfNotPresent, shipping stale bits). Keep
  # this value in lockstep with the same field in procurement-spend-
  # dashboard.yaml (the rendered manifest).
  tag: "0.1.0-84e773fd"
  # Bumped from IfNotPresent → Always so future tag floats can't
  # silently degrade to a cached node image.
  pullPolicy: Always

cloudflareZone: apps.mckinsey.com
subdomainPrefix: cummins-idp-procurement
ingressClass: nginx

labels:
  app.kubernetes.io/namespace-owner: "lrah-control-plane"
  app.kubernetes.io/lrah-user-product-id: 24468
  app.kubernetes.io/lrah-user-environment-id: cumminsidp-a8dd5

imagePullSecrets:
  - name: jfrog-cumminsidp-a8dd5-secret

env:
  NODE_ENV: production
#   AWS_REGION: us-east-1
#   # Add your environment variables here
#

# ----- Spend data (S3) -----
# data.json is ~255 MB — too large for K8s Secret/ConfigMap (etcd 1 MiB cap).
# The pod fetches it from S3 at startup via an initContainer using IRSA.
# Refresh = re-upload the object to the bucket; no chart change needed.
#
# Bucket is provisioned by iac/main.tf (s3_buckets["spend-data"]). The full
# AWS bucket name is computed by LRAH as
#   ${AWS_WORKLOAD_ACCOUNT_ID}-${USER_ENVIRONMENT_ID}-spend-data
#   = 649941507750-cumminsidp-a8dd5-spend-data
s3:
  bucket: 649941507750-cumminsidp-a8dd5-spend-data
  objectKey: data.json
  region: us-east-1

# AWS CLI image for the data-fetch initContainer. If your tenant's image
# allow-list blocks Docker Hub, mirror this to JFrog and override here:
#   initImage: mckinsey-cummins-idp-dashboard-docker-local.jfrog.io/aws-cli:2.17.46
initImage: amazon/aws-cli:2.17.46

# IRSA: the LRAH module provisions one SA role per env and attaches per-bucket
# policies as buckets are added to `s3_buckets`. Setting this triggers
# templates/service-account.yaml to create the ServiceAccount with the
# eks.amazonaws.com/role-arn annotation that the EKS Pod Identity webhook
# uses to inject AWS_ROLE_ARN / AWS_WEB_IDENTITY_TOKEN_FILE into the pod.
deployer:
  saReadWriteRoleARN: arn:aws:iam::649941507750:role/SA-649941507750-cumminsidp-a8dd5-ReadWrite

## For all databases you define in terraform/main.tf
#
### On AWS RDS:
# Database: cumminsidp-a8dd5-<dbname>
### On Kubernetes (in your namespace):
# ConfigMaps:
# - postgresql-databases-cumminsidp-a8dd5-<dbname>
# Secrets:
# - postgresql-roles-cumminsidp-a8dd5-<dbname>
#
# Example database configuration:
# deployer:
#   dbConfigMap: postgresql-databases-cumminsidp-a8dd5-<dbname>
#   dbSecret: postgresql-roles-cumminsidp-a8dd5-<dbname>
#   dbName: cumminsidp-a8dd5-<dbname>
#   dbRole: owner
#
## For all S3 buckets you define in terraform/main.tf:
#
### On AWS:
# S3 bucket: 649941507750-cumminsidp-a8dd5-<bucketname>
# IAM roles:
# - s3ReadWriteRoleARN: arn:aws:iam::649941507750:role/S3-649941507750-cumminsidp-a8dd5-<bucketname>-ReadWrite
# - s3ReadRoleARN: arn:aws:iam::649941507750:role/S3-649941507750-cumminsidp-a8dd5-<bucketname>-Read
#
# Example service account with IAM role (IRSA):
# deployer:
#   saReadWriteRoleARN: arn:aws:iam::649941507750:role/SA-649941507750-cumminsidp-a8dd5-ReadWrite
#
# Example external URL for your application:
# deployer:
#   externalURL: https://cumminsidp-a8dd5.apps.mckinsey.com/
#
