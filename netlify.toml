# Build regenerates JSON and stages the static dashboard bundle (data + PPI workbooks for same-origin fetch).
[build]
  publish = "src/dashboard"
  command = "pip install -r requirements.txt && python src/scripts/refresh_data.py && cp data/outputs/data.json src/dashboard/ && find data/inputs/indexes -maxdepth 1 -name '*.xlsx' -exec cp {} src/dashboard/ \\;"

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
