# Non-root nginx config for the procurement spend dashboard container.
# Listens on 8080 (USER nginx in Dockerfile cannot bind <1024).

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sensible defaults
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers (Cloudflare Access also enforces auth at the edge)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy
    #
    # The dashboard pulls 3 JS libs and 1 font family from third-party
    # CDNs (Tailwind was on this list — it has since been precompiled
    # into /tailwind.css at Docker build time and is no longer fetched
    # over the network; see Dockerfile `tailwind-build` stage and
    # deploy/tailwind/). Each remaining CDN is allow-listed by exact
    # hostname — no wildcards, no blanket "*", no 'unsafe-eval'.
    #
    # Hosts and what they serve (mirrors the <script>/<link> tags in
    # src/dashboard/index.html):
    #
    #   script-src
    #     https://cdn.jsdelivr.net      Chart.js + chartjs-plugin-datalabels
    #     https://cdnjs.cloudflare.com  pako (zlib for CSV decompression)
    #     https://cdn.sheetjs.com       SheetJS / XLSX export
    #
    #   style-src
    #     https://fonts.googleapis.com  Inter family CSS
    #
    #   font-src
    #     https://fonts.gstatic.com     Inter woff2 files
    #
    # 'unsafe-inline' is kept on script-src and style-src because
    # index.html contains a 4,000-line inline <script> and several
    # inline <style> blocks the dashboard depends on. data: URIs are
    # kept on img-src/font-src for inline SVG dropdown chevrons and the
    # Inter woff2 base64 fallback. connect-src stays at 'self' —
    # data.json is fetched from /data.json on the same origin (proxied
    # to the S3-sourced initContainer volume).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'" always;

    # data.json is fetched from S3 by an initContainer at pod startup
    # (see deploy/helm/procurement-spend-dashboard/templates/deployment.yaml
    # and values-prod-us-east-1.yaml `s3:` block). Short cache, never via CDN.
    #
    # The Helm chart's canonical layout is a subPath mount at
    # /usr/share/nginx/html/data.json, but live pods have shown the file
    # landing under /usr/share/nginx/html/public/data/data.json instead
    # (e.g. when the deployer overlay tweaks the mount layout). To make the
    # route robust against either layout — and to free the front-end from
    # walking its 3-URL fallback chain on every load — try both paths under
    # `root` before returning 404.
    location = /data.json {
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /data.json /public/data/data.json =404;
    }

    # Static assets: return REAL 404s if missing — do NOT fall through to
    # the SPA index.html below.
    #
    # Background: without this rule, the catch-all `location /` block
    # served `index.html` for ANY missing path, including .css and .js
    # files. The browser then received `Content-Type: text/html` for a
    # request it expected to be CSS or JS, "parsed" the response, and
    # silently failed — leaving the page either unstyled (missing CSS)
    # or stalled mid-load on a ReferenceError to a never-loaded global
    # (missing JS). The two failures that landed us here:
    #
    #   * /tailwind.css missing in the runtime image                 →
    #     browser receives index.html as text/html, parses nothing as
    #     CSS, every Tailwind utility class (`.hidden`, `!h-full`,
    #     `!w-full`, …) silently has no rule, sidebar tabs and chart
    #     canvases break.
    #
    #   * /harmonization-client.js missing in the runtime image      →
    #     browser receives index.html as text/html, parses nothing as
    #     JS, the HarmonizationClient IIFE never registers its global,
    #     applyPayloadToD() throws a ReferenceError mid-cube-build,
    #     the "Processing spend cube / Interning rows…" overlay
    #     becomes the user's permanent view with a Retry button that
    #     never recovers.
    #
    # Returning a real 404 means the same bug now surfaces as a clean
    # browser-console error (`Failed to load resource: 404`) instead
    # of a mysterious hang, and the Dockerfile-level sanity checks
    # remain the first line of defence.
    #
    # `^~` modifier disables regex-block override and lets nginx pick
    # the longest prefix match; the regex rule itself uses `~*` for
    # case-insensitive extension matching. Order: this block runs
    # before `location /` because nginx evaluates regex blocks ahead
    # of un-modified prefix blocks.
    location ~* \.(css|js|map|mjs|json|png|jpe?g|gif|svg|webp|avif|ico|woff2?|ttf|eot|otf|xlsx?|csv)$ {
        try_files $uri =404;
    }

    # SPA entry point: index.html must NEVER be cached at the edge or
    # in the browser. The dashboard's JS, CSS, and inline asset hashes
    # are all rebuilt every commit (the docker tag itself is the only
    # cache key the file system has), so a CDN-cached index.html can
    # leave users on a previous bundle for an unbounded amount of
    # time. This bit us three deploys in a row (commits 9cc9bad,
    # da89380, 867470a) where the deploy + ArgoCD sync went green but
    # Cloudflare kept serving the previous index.html for a while
    # afterwards, forcing a manual purge.
    #
    # `no-cache, must-revalidate` lets the browser keep the file in
    # local cache but forces a revalidation request on every page
    # load; the origin then returns 200 with the new content (or 304
    # if unchanged). At Cloudflare, this combination tells the edge
    # cache to revalidate against the origin on every request, which
    # is what we want for the SPA entry point.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /index.html =404;
    }
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /index.html =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health endpoint used by the K8s probes (see Helm chart).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
