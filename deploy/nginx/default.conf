# Non-root nginx config for the procurement spend dashboard container.
# Listens on 8080 (USER nginx in Dockerfile cannot bind <1024).

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sensible defaults
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers (Cloudflare Access also enforces auth at the edge)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy
    #
    # The dashboard pulls 4 JS libs and 1 font family from third-party CDNs.
    # Each CDN is allow-listed by exact hostname (no wildcards, no blanket
    # "*", no 'unsafe-eval') so the policy stays tight even though we're not
    # bundling assets yet (that's the planned follow-up optimisation).
    #
    # Hosts and what they serve (mirrors the <script>/<link> tags in
    # src/dashboard/index.html):
    #
    #   script-src
    #     https://cdn.jsdelivr.net      Chart.js + chartjs-plugin-datalabels
    #     https://cdnjs.cloudflare.com  pako (zlib for CSV decompression)
    #     https://cdn.sheetjs.com       SheetJS / XLSX export
    #     https://cdn.tailwindcss.com   Tailwind Play CDN runtime *
    #
    #   style-src
    #     https://fonts.googleapis.com  Inter family CSS
    #
    #   font-src
    #     https://fonts.gstatic.com     Inter woff2 files
    #
    # 'unsafe-inline' is kept on script-src and style-src because index.html
    # contains a 4,000-line inline <script> and several inline <style> blocks
    # the dashboard depends on. data: URIs are kept on img-src/font-src for
    # inline SVG dropdown chevrons and the Inter woff2 base64 fallback.
    # connect-src stays at 'self' — data.json is fetched from /data.json on
    # the same origin (proxied to the S3-sourced initContainer volume).
    #
    # * Tailwind Play CDN compiles utility classes in the browser via
    #   `new Function(...)`, which requires 'unsafe-eval'. We deliberately
    #   do NOT add 'unsafe-eval' here per the security directive. The
    #   tailwindcss.com script will load (host is allow-listed) but its
    #   runtime JIT will fail with a separate CSP eval violation, so
    #   utility classes won't be compiled. The fix is to switch to a
    #   built/precompiled Tailwind CSS file shipped from the container —
    #   tracked as the follow-up optimisation.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'" always;

    # data.json is fetched from S3 by an initContainer at pod startup
    # (see deploy/helm/procurement-spend-dashboard/templates/deployment.yaml
    # and values-prod-us-east-1.yaml `s3:` block). Short cache, never via CDN.
    #
    # The Helm chart's canonical layout is a subPath mount at
    # /usr/share/nginx/html/data.json, but live pods have shown the file
    # landing under /usr/share/nginx/html/public/data/data.json instead
    # (e.g. when the deployer overlay tweaks the mount layout). To make the
    # route robust against either layout — and to free the front-end from
    # walking its 3-URL fallback chain on every load — try both paths under
    # `root` before returning 404.
    location = /data.json {
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /data.json /public/data/data.json =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health endpoint used by the K8s probes (see Helm chart).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
