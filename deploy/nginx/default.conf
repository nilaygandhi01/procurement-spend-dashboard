# Non-root nginx config for the procurement spend dashboard container.
# Listens on 8080 (USER nginx in Dockerfile cannot bind <1024).

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sensible defaults
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers (Cloudflare Access also enforces auth at the edge)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy
    #
    # The dashboard pulls 3 JS libs and 1 font family from third-party
    # CDNs (Tailwind was on this list — it has since been precompiled
    # into /tailwind.css at Docker build time and is no longer fetched
    # over the network; see Dockerfile `tailwind-build` stage and
    # deploy/tailwind/). Each remaining CDN is allow-listed by exact
    # hostname — no wildcards, no blanket "*", no 'unsafe-eval'.
    #
    # Hosts and what they serve (mirrors the <script>/<link> tags in
    # src/dashboard/index.html):
    #
    #   script-src
    #     https://cdn.jsdelivr.net      Chart.js + chartjs-plugin-datalabels
    #     https://cdnjs.cloudflare.com  pako (zlib for CSV decompression)
    #     https://cdn.sheetjs.com       SheetJS / XLSX export
    #
    #   style-src
    #     https://fonts.googleapis.com  Inter family CSS
    #
    #   font-src
    #     https://fonts.gstatic.com     Inter woff2 files
    #
    # 'unsafe-inline' is kept on script-src and style-src because
    # index.html contains a 4,000-line inline <script> and several
    # inline <style> blocks the dashboard depends on. data: URIs are
    # kept on img-src/font-src for inline SVG dropdown chevrons and the
    # Inter woff2 base64 fallback. connect-src stays at 'self' —
    # data.json is fetched from /data.json on the same origin (proxied
    # to the S3-sourced initContainer volume).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.sheetjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'" always;

    # data.json is fetched from S3 by an initContainer at pod startup
    # (see deploy/helm/procurement-spend-dashboard/templates/deployment.yaml
    # and values-prod-us-east-1.yaml `s3:` block). Short cache, never via CDN.
    #
    # The Helm chart's canonical layout is a subPath mount at
    # /usr/share/nginx/html/data.json, but live pods have shown the file
    # landing under /usr/share/nginx/html/public/data/data.json instead
    # (e.g. when the deployer overlay tweaks the mount layout). To make the
    # route robust against either layout — and to free the front-end from
    # walking its 3-URL fallback chain on every load — try both paths under
    # `root` before returning 404.
    location = /data.json {
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /data.json /public/data/data.json =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health endpoint used by the K8s probes (see Helm chart).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
