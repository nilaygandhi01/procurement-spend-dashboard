apiVersion: v1
kind: Service
metadata:
  name: {{ include "psd.fullname" . }}
  labels:
    {{- include "psd.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "psd.selectorLabels" . | nindent 4 }}
