{{- if and .Values.deployer .Values.deployer.saReadWriteRoleARN }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "psd.fullname" . }}-sa
  labels:
    {{- include "psd.labels" . | nindent 4 }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.deployer.saReadWriteRoleARN }}
{{- end }}
