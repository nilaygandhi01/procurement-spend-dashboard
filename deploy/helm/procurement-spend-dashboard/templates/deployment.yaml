apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "psd.fullname" . }}
  labels:
    {{- include "psd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "psd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "psd.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.deployer .Values.deployer.saReadWriteRoleARN }}
      serviceAccountName: {{ include "psd.fullname" . }}-sa
      {{- end }}
      automountServiceAccountToken: false
      {{- if and .Values.s3 .Values.s3.bucket }}
      initContainers:
        - name: fetch-data
          image: {{ .Values.initImage | default "amazon/aws-cli:2.17.46" }}
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_REGION
              value: {{ .Values.s3.region | default "us-east-1" | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.s3.region | default "us-east-1" | quote }}
            - name: BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: OBJECT_KEY
              value: {{ .Values.s3.objectKey | default "data.json" | quote }}
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              aws s3 cp "s3://${BUCKET}/${OBJECT_KEY}" /work/data.json
              echo "fetched $(wc -c < /work/data.json) bytes"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app-data
              mountPath: /work
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          volumeMounts:
            {{- if and .Values.s3 .Values.s3.bucket }}
            - name: app-data
              mountPath: /usr/share/nginx/html/data.json
              subPath: data.json
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if and .Values.s3 .Values.s3.bucket }}
        - name: app-data
          emptyDir:
            sizeLimit: 1Gi
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
