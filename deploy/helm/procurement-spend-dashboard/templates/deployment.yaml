apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "psd.fullname" . }}
  labels:
    {{- include "psd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "psd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "psd.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod when the mounted Secret changes.
        checksum/data-secret: {{ .Values.data.secretName | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          volumeMounts:
            - name: spend-data
              mountPath: {{ .Values.data.mountPath }}
              subPath: {{ .Values.data.subPath }}
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: spend-data
          secret:
            secretName: {{ .Values.data.secretName }}
            items:
              - key: {{ .Values.data.secretKey }}
                path: {{ .Values.data.subPath }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
